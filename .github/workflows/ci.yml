name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kairos
          POSTGRES_PASSWORD: kairos
          POSTGRES_DB: kairos_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build & Test
        working-directory: backend
        run: ./mvnw verify -Dspring.datasource.url=jdbc:postgresql://localhost:5432/kairos_test
