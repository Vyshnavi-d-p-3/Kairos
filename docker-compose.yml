version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: kairos
      POSTGRES_PASSWORD: kairos
      POSTGRES_DB: kairos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairos"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # observability
  # Jaeger all-in-one: accepts OTLP over HTTP on 4318 and gRPC on 4317.
  # UI on 16686.
  jaeger:
    image: jaegertracing/all-in-one:1.62
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP/HTTP — what the backend pushes spans to
      - "4317:4317"     # OTLP/gRPC

  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      # Lets Prometheus inside the container scrape the backend running on the
      # macOS / Linux host at host.docker.internal:8080.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
